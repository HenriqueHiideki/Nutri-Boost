<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri Boost - Sistema para Nutricionistas</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" href="./img/nutrition.png">
</head>

<body>

    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="logo-container">
                <img src="./img/logo-nutri-boost.png" alt="Logo da Nutri Boost" class="menu-logo">
            </div>

            <div class="menu-principal">
                <div class="menu-align menu-active">
                    <img src="./img/icon-home.svg" alt="icone de home" class="img-menu">
                    <p class="text-menu">Dashboard</p>
                </div>
                <div class="menu-align">
                    <img src="./img/icon-user.png" alt="icone de pacientes" class="img-menu">
                    <p class="text-menu">Pacientes</p>
                </div>
                <div class="menu-align">
                    <img src="./img/icon-add-user.png" alt="icone de cadastro" class="img-menu">
                    <p class="text-menu">Cadastro de Pacientes</p>
                </div>
                <div class="menu-align">
                    <img src="./img/icon-relatorio.png" alt="icone de relatorios" class="img-menu">
                    <p class="text-menu">Relatórios</p>
                </div>
                <div class="menu-align">
                    <img src="./img/icon-configuration.png" alt="icone de configuracao" class="img-menu">
                    <p class="text-menu">Configurações</p>
                </div>
            </div>

            <hr class="divisor-menu">

            <div class="menu-align-bottom">
                <div class="menu-align">
                    <img src="./img/icon-help.png" alt="icone de ajuda" class="img-menu">
                    <p class="text-menu">Ajuda</p>
                </div>
                <div class="menu-align">
                    <img src="./img/icon-support.png" alt="icone de suporte" class="img-menu">
                    <p class="text-menu">Suporte</p>
                </div>
                <div class="menu-align">
                    <img src="./img/icon-logout.png" alt="icone de saida" class="img-menu">
                    <p class="text-menu">Sair</p>
                </div>
            </div>
        </aside>

        <div class="main-content">
            <header class="header-geral">
                <form role="search" class="barra-pesquisa">
                    <svg class="icone-busca" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>

                    <input type="search" placeholder="Busca..." aria-label="Buscar">
                </form>

                <div class="container-img-header">
                    <img src="./img/bell.png" alt="ícone de notificacoes" class="img-notification">
                    <img src="./img/foto-nutricionista.png" alt="foto de uma nutricionista" class="img-perfil">
                    <p class="header-text">Dra. Júlia Macedo</p>
                    <img src="./img/icon-configuration.png" alt="icone de configuracao" class="img-configuration">
                </div>
            </header>

            <section class="consultas-geral">
                <p class="consultas-title">Bem Vinda, Dra. Júlia Macedo!</p>

                <div class="container-consultas">
                    <div class="card-consultas">
                        <p class="consultas-text">Próximas Consultas</p>
                        <button type="button">Ver Consultas</button>
                    </div>
                </div>

            </section>
        </div>
    </div>

</body>
<script src="./js/script.js"></script>

</html>
